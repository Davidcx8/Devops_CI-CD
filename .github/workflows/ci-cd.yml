name: ci-cd

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  LOCAL_IMAGE: "devops-ci-cd-app:test"

jobs:
  ci-cd:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest -q

      - name: Prepare image metadata
        id: image
        run: |
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "remote_image=${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPOSITORY }}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: docker build --tag "${{ env.LOCAL_IMAGE }}" .

      - name: Validate release secrets
        if: github.ref == 'refs/heads/main'
        run: |
          [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ] || { echo "Missing secret: DOCKERHUB_USERNAME"; exit 1; }
          [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ] || { echo "Missing secret: DOCKERHUB_TOKEN"; exit 1; }
          [ -n "${{ secrets.DOCKERHUB_REPOSITORY }}" ] || { echo "Missing secret: DOCKERHUB_REPOSITORY"; exit 1; }
          [ -n "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ] || { echo "Missing secret: RENDER_DEPLOY_HOOK_URL"; exit 1; }

      - name: Log in to Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag Docker image
        if: github.ref == 'refs/heads/main'
        run: |
          docker tag "${{ env.LOCAL_IMAGE }}" "${{ steps.image.outputs.remote_image }}:latest"
          docker tag "${{ env.LOCAL_IMAGE }}" "${{ steps.image.outputs.remote_image }}:sha-${{ steps.image.outputs.short_sha }}"

      - name: Push Docker image
        if: github.ref == 'refs/heads/main'
        run: |
          docker push "${{ steps.image.outputs.remote_image }}:latest"
          docker push "${{ steps.image.outputs.remote_image }}:sha-${{ steps.image.outputs.short_sha }}"

      - name: Deploy to Render
        if: github.ref == 'refs/heads/main'
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: curl --fail --silent --show-error --request POST "$RENDER_DEPLOY_HOOK_URL"
